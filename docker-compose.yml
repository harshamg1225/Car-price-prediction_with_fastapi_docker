version: "3.9"



services:
  
  api:
    build: .
    container_name: fastapi-app
    ports: 
      - "8000:8000"
    environment:
      - API_KEY=DEMO-KEY
      - JWT_SECRET_KEY=secret
      - REDIS_URL=redis://localhost:6379

    
    depends_on:
      - redis
      - prometheus
    
    networks:
      - backend


prometheus:

  image: prom/prometheus
  container_name: prometheus1
  volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml

  ports: 
    - "9090:9090"
    
  networks: 
    - backend

redis:
  image: redis:alpine
  container_name: redis1
  ports: 
    - "6379:6379"
  
  networks:
    - backend

      